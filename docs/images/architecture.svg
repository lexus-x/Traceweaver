<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#1f6feb"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3fb950"/>
      <stop offset="100%" style="stop-color:#238636"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bc8cff"/>
      <stop offset="100%" style="stop-color:#8957e5"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0883e"/>
      <stop offset="100%" style="stop-color:#bd561d"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="700" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="550" y="45" text-anchor="middle" fill="#e6edf3" font-size="22" font-weight="bold">TraceWeaver — Architecture Overview</text>
  <text x="550" y="68" text-anchor="middle" fill="#8b949e" font-size="13">Distributed Trace Compression &amp; Anomaly Detection Engine</text>

  <!-- Layer 1: Trace Sources -->
  <rect x="50" y="95" width="200" height="70" rx="10" fill="url(#blue)" filter="url(#shadow)"/>
  <text x="150" y="125" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Microservice Mesh</text>
  <text x="150" y="145" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">10 services, 50 endpoints</text>

  <rect x="300" y="95" width="200" height="70" rx="10" fill="url(#blue)" filter="url(#shadow)"/>
  <text x="400" y="125" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">OTLP/gRPC Collector</text>
  <text x="400" y="145" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">OpenTelemetry compatible</text>

  <rect x="550" y="95" width="200" height="70" rx="10" fill="url(#blue)" filter="url(#shadow)"/>
  <text x="650" y="125" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Trace Parser</text>
  <text x="650" y="145" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">Span DAG builder</text>

  <!-- Arrows Layer 1 -->
  <path d="M250 130 L300 130" stroke="#58a6ff" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M500 130 L550 130" stroke="#58a6ff" stroke-width="2" fill="none"/>
  <defs><marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/></marker></defs>

  <!-- Layer 2: Processing Pipeline -->
  <rect x="50" y="210" width="1000" height="180" rx="12" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="70" y="235" fill="#8b949e" font-size="11" font-weight="bold" letter-spacing="1">PROCESSING PIPELINE</text>

  <!-- Dictionary Encoder -->
  <rect x="80" y="255" width="170" height="110" rx="8" fill="url(#green)" filter="url(#shadow)"/>
  <text x="165" y="282" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Dictionary Encoder</text>
  <text x="165" y="300" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">Service/operation names</text>
  <text x="165" y="315" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">→ integer table IDs</text>
  <text x="165" y="340" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">~60% size reduction</text>

  <!-- Template Matcher -->
  <rect x="280" y="255" width="170" height="110" rx="8" fill="url(#purple)" filter="url(#shadow)"/>
  <text x="365" y="282" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Template Matcher</text>
  <text x="365" y="300" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">MinHash + LSH</text>
  <text x="365" y="315" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">Graph similarity</text>
  <text x="365" y="340" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">85% Jaccard threshold</text>

  <!-- Delta Encoder -->
  <rect x="480" y="255" width="170" height="110" rx="8" fill="url(#green)" filter="url(#shadow)"/>
  <text x="565" y="282" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Delta Encoder</text>
  <text x="565" y="300" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">Varint timestamps</text>
  <text x="565" y="315" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">Deviation diffs only</text>
  <text x="565" y="340" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">~90% temporal reduction</text>

  <!-- Anomaly Detector -->
  <rect x="680" y="255" width="170" height="110" rx="8" fill="url(#orange)" filter="url(#shadow)"/>
  <text x="765" y="282" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Anomaly Detector</text>
  <text x="765" y="300" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">t-digest streaming</text>
  <text x="765" y="315" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">Z-score + error flags</text>
  <text x="765" y="340" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">&gt;95% recall, &lt;1% FP</text>

  <!-- Compressor -->
  <rect x="880" y="255" width="150" height="110" rx="8" fill="url(#green)" filter="url(#shadow)"/>
  <text x="955" y="282" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Zlib Compressor</text>
  <text x="955" y="300" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">Level 6 compression</text>
  <text x="955" y="315" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">Final output stage</text>
  <text x="955" y="340" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">16-25× total ratio</text>

  <!-- Pipeline arrows -->
  <path d="M250 310 L280 310" stroke="#8b949e" stroke-width="1.5" fill="none" marker-end="url(#arrowGray)"/>
  <path d="M450 310 L480 310" stroke="#8b949e" stroke-width="1.5" fill="none" marker-end="url(#arrowGray)"/>
  <path d="M650 310 L680 310" stroke="#8b949e" stroke-width="1.5" fill="none" marker-end="url(#arrowGray)"/>
  <path d="M850 310 L880 310" stroke="#8b949e" stroke-width="1.5" fill="none" marker-end="url(#arrowGray)"/>
  <defs><marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#8b949e"/></marker></defs>

  <!-- Layer 3: Storage & Query -->
  <rect x="50" y="430" width="480" height="130" rx="12" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="70" y="455" fill="#8b949e" font-size="11" font-weight="bold" letter-spacing="1">STORAGE (ClickHouse)</text>

  <rect x="80" y="470" width="200" height="70" rx="8" fill="url(#green)" filter="url(#shadow)"/>
  <text x="180" y="498" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Columnar Store</text>
  <text x="180" y="518" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">MergeTree engine, LZ4 compression</text>

  <rect x="310" y="470" width="200" height="70" rx="8" fill="url(#green)" filter="url(#shadow)"/>
  <text x="410" y="498" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Materialized Views</text>
  <text x="410" y="518" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">Real-time latency percentiles</text>

  <!-- Layer 4: Visualization -->
  <rect x="580" y="430" width="470" height="130" rx="12" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="600" y="455" fill="#8b949e" font-size="11" font-weight="bold" letter-spacing="1">VISUALIZATION (Grafana)</text>

  <rect x="610" y="470" width="195" height="70" rx="8" fill="url(#purple)" filter="url(#shadow)"/>
  <text x="707" y="498" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Compression Dashboard</text>
  <text x="707" y="518" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">Ratios, template hits, throughput</text>

  <rect x="830" y="470" width="195" height="70" rx="8" fill="url(#orange)" filter="url(#shadow)"/>
  <text x="927" y="498" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Anomaly Monitor</text>
  <text x="927" y="518" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">Real-time alerts, service health</text>

  <!-- Arrows to storage -->
  <path d="M565 365 L300 470" stroke="#3fb950" stroke-width="2" fill="none" stroke-dasharray="6,3"/>
  <path d="M765 365 L700 470" stroke="#f0883e" stroke-width="2" fill="none" stroke-dasharray="6,3"/>
  <path d="M955 365 L900 470" stroke="#3fb950" stroke-width="2" fill="none" stroke-dasharray="6,3"/>

  <!-- Layer 5: Benchmark -->
  <rect x="50" y="600" width="1000" height="70" rx="12" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="70" y="625" fill="#8b949e" font-size="11" font-weight="bold" letter-spacing="1">BENCHMARK SUITE (TraceBench)</text>

  <rect x="80" y="635" width="200" height="25" rx="5" fill="url(#blue)"/>
  <text x="180" y="652" text-anchor="middle" fill="#fff" font-size="10">Synthetic Trace Generator</text>

  <rect x="310" y="635" width="200" height="25" rx="5" fill="url(#blue)"/>
  <text x="410" y="652" text-anchor="middle" fill="#fff" font-size="10">vs Jaeger+ES Baseline</text>

  <rect x="540" y="635" width="200" height="25" rx="5" fill="url(#blue)"/>
  <text x="640" y="652" text-anchor="middle" fill="#fff" font-size="10">Reproducible Scripts</text>

  <rect x="770" y="635" width="260" height="25" rx="5" fill="url(#blue)"/>
  <text x="900" y="652" text-anchor="middle" fill="#fff" font-size="10">Grafana Dashboard JSON Export</text>
</svg>
